name: Setup pnpm + Node + dependencies
description: >-
  Shared setup for CI jobs: install pnpm (version pinned by the root
  package.json `packageManager` field — do not pin it again here), install
  Node from .nvmrc with the pnpm store cached by setup-node, then a
  frozen-lockfile install. Callers must run actions/checkout first — a local
  composite action only exists after checkout, so the checkout step cannot
  live inside it.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        # Caches the pnpm store (not node_modules — caching node_modules
        # breaks on native/platform differences and saves little with pnpm).
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
